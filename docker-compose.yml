services:
  whatsapp-bridge:
    build: ./whatsapp-bridge
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: "3000"
      WEBHOOK_URL: "http://newsbot:8000/webhook/whatsapp"
      SESSION_DIR: "/app/auth_session"
      LOG_LEVEL: "info"
      WHATSAPP_BRIDGE_TOKEN: ${WHATSAPP_BRIDGE_TOKEN:-newsbot-local-bridge-token}
    volumes:
      - whatsapp_session:/app/auth_session
    restart: unless-stopped

  newsbot:
    build: .
    env_file: .env
    environment:
      NEWSBOT_USE_ALEMBIC_ONLY: "1"
      WHATSAPP_BRIDGE_TOKEN: ${WHATSAPP_BRIDGE_TOKEN:-newsbot-local-bridge-token}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - whatsapp-bridge

volumes:
  whatsapp_session:
